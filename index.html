<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕事ストレスチェック診断｜約1分で無料診断【Worelu】</title>
<meta name="description" content="10問・約1分でストレス状態を無料診断。仕事・心身・燃え尽き・転職意向を4つの観点からAIがリアルタイム分析します。登録不要・完全無料。">
<meta name="robots" content="index,follow">
<meta property="og:title" content="仕事ストレスチェック診断｜約1分で無料診断【Worelu】">
<meta property="og:description" content="10問・約1分でストレス状態を無料診断。仕事・心身・燃え尽き・転職意向を4つの観点からAIがリアルタイム分析します。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://worelu.com/">
<meta property="og:image" content="https://worelu.com/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://worelu.com/">
<link rel="icon" href="/favicon.ico">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Worelu ストレスチェック",
  "url": "https://worelu.com/",
  "description": "仕事・心身・燃え尽き・転職意向を4つの観点からAIがリアルタイム分析する無料ストレスチェック診断",
  "applicationCategory": "HealthApplication",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" }
}
</script>
<style>
  :root {
    --accent: #8B6F47;
    --accent-soft: #F5EFE6;
    --accent-dark: #6B5236;
    --text: #2C2416;
    --muted: #8C7B6A;
    --line: #E8DFD0;
    --panel: #FFFDF9;
    --page: #F5F0E8;
    --sand-1: #FAF5EC;
    --sand-2: #EDE4D3;
    --sand-3: #D4C5AE;
    --sand-dark: #4A3F2F;
    --warning: #A0742A;
    --danger: #B54A3A;
    --col-stress: #C0603A;
    --col-burnout: #A0742A;
    --col-environment: #3A6E8A;
    --col-leaving: #6E5A8E;
    --radius: 12px;
    --shadow: 0 14px 38px rgba(44,36,22,0.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--page);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    line-height: 1.6;
  }
  button, input { font: inherit; }
  .hidden { display: none !important; }

  /* HEADER */
  .site-header {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo { font-size: 16px; font-weight: 800; color: var(--sand-dark); letter-spacing: -0.02em; }
  .site-tagline { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .site-right { font-size: 12px; color: var(--muted); }

  /* APP LAYOUT */
  .app {
    width: min(1180px, calc(100% - 32px));
    margin: 32px auto;
    display: grid;
    grid-template-columns: minmax(0, 1.06fr) minmax(360px, 0.94fr);
    gap: 20px;
    align-items: stretch;
  }

  /* QUESTION AREA */
  .question-area {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    min-height: 720px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* INTRO BLOCK */
  .intro-block {
    background: var(--sand-2);
    border: 1px solid var(--sand-3);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }
  .intro-block h1 {
    font-size: 14px;
    font-weight: 800;
    color: var(--sand-dark);
    margin-bottom: 5px;
  }
  .intro-block p { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
  .intro-chips { display: flex; gap: 10px; flex-wrap: wrap; }
  .intro-chip { font-size: 11px; color: var(--accent); font-weight: 700; }

  /* TOPLINE */
  .topline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .kicker { color: var(--sand-dark); font-size: 12px; font-weight: 800; letter-spacing: 0.03em; }
  .q-count { color: var(--muted); font-size: 14px; font-weight: 700; }

  /* PROGRESS */
  .progress {
    height: 9px;
    margin-bottom: 28px;
    overflow: hidden;
    border-radius: 999px;
    background: #EEF3F1;
  }
  .progress-fill {
    height: 100%;
    width: 10%;
    border-radius: inherit;
    background: var(--accent);
    transition: width 320ms ease;
  }

  /* TYPE BADGE */
  .q-type-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 10px;
    background: var(--sand-2);
    color: var(--accent-dark);
    border: 1px solid var(--sand-3);
  }

  /* QUESTION TEXT */
  .q-text {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 700;
    line-height: 1.38;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }

  /* OPTIONS */
  .options { display: grid; gap: 12px; margin-bottom: auto; }
  .option {
    position: relative;
    display: grid;
    grid-template-columns: 22px minmax(0,1fr);
    gap: 14px;
    min-height: 72px;
    padding: 15px 18px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
  }
  .option:hover {
    border-color: rgba(29,158,117,0.48);
    transform: translateY(-1px);
    box-shadow: 0 9px 20px rgba(21,40,35,0.06);
  }
  .option input { position: absolute; opacity: 0; pointer-events: none; }
  .opt-radio {
    width: 22px; height: 22px; margin-top: 2px;
    border: 2px solid #CBD7D2; border-radius: 999px;
    background: #fff;
    box-shadow: inset 0 0 0 5px #fff;
    transition: border-color 180ms ease, background 180ms ease;
    flex-shrink: 0;
  }
  .opt-text { min-width: 0; }
  .opt-label { font-size: 15px; font-weight: 700; line-height: 1.45; }
  .opt-note { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 600; }
  .option.selected { border-color: var(--accent); background: var(--accent-soft); }
  .option.selected .opt-radio { border-color: var(--accent); background: var(--accent); }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 28px;
  }
  .btn {
    min-width: 116px; min-height: 46px; padding: 0 18px;
    border: 1px solid var(--line); border-radius: 10px;
    background: #fff; color: var(--text);
    font-weight: 800; cursor: pointer;
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); border-color: #BFD0CA; }
  .btn:disabled { color: #A7B1AD; cursor: not-allowed; }
  .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
  .btn.primary:hover:not(:disabled) { background: var(--accent-dark); border-color: var(--accent-dark); }

  /* PREVIEW PANEL */
  .preview-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .preview-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .live-label { color: var(--muted); font-size: 12px; font-weight: 900; }
  .live-dot {
    display: inline-flex; width: 8px; height: 8px; margin-right: 7px;
    border-radius: 999px; background: var(--accent);
    box-shadow: 0 0 0 5px rgba(139,111,71,0.15);
  }
  .risk-pill {
    padding: 6px 10px; border-radius: 999px;
    background: var(--sand-2); color: var(--sand-dark);
    font-size: 12px; font-weight: 900; border: 1px solid var(--sand-3);
  }

  /* TOTAL SCORE */
  .total-card {
    display: grid;
    grid-template-columns: minmax(0,1fr) auto;
    gap: 12px;
    align-items: end;
  }
  .total-label { color: var(--muted); font-size: 13px; font-weight: 800; margin-bottom: 4px; }
  .total-score-row { display: flex; align-items: baseline; gap: 8px; }
  .score-number {
    min-width: 100px;
    font-size: clamp(54px,7vw,80px);
    line-height: 0.92;
    font-weight: 900;
    letter-spacing: -0.02em;
    transition: color 220ms ease, transform 220ms ease;
  }
  .score-number.bump { color: var(--accent); transform: scale(1.035); }
  .score-unit { color: var(--muted); font-size: 17px; font-weight: 800; }
  .floating-delta {
    justify-self: end;
    min-width: 54px; text-align: right;
    color: var(--accent); font-size: 24px; font-weight: 900;
    opacity: 0; transform: translateY(8px);
  }
  .floating-delta.show { animation: floatDelta 680ms ease both; }
  @keyframes floatDelta {
    0%   { opacity:0; transform:translateY(10px); }
    22%  { opacity:1; }
    100% { opacity:0; transform:translateY(-16px); }
  }

  /* AXES */
  .axes { display: grid; gap: 14px; }
  .axis-item { display: grid; gap: 7px; }
  .axis-top {
    display: grid;
    grid-template-columns: minmax(100px,1fr) auto auto;
    gap: 10px;
    align-items: baseline;
  }
  .axis-name { font-size: 13px; font-weight: 800; }
  .axis-val { min-width: 32px; text-align: right; font-size: 13px; font-weight: 900; }
  .axis-delta {
    min-width: 38px; text-align: right;
    color: var(--muted); font-size: 12px; font-weight: 900;
    opacity: 0.78;
    transition: color 160ms ease;
  }
  .axis-delta.delta-up { color: var(--danger); }
  .axis-delta.delta-down { color: var(--accent); }
  .axis-delta.delta-pop { animation: deltaPop 520ms ease; }
  @keyframes deltaPop {
    0%   { transform:scale(0.8); opacity:0; }
    45%  { transform:scale(1.18); opacity:1; }
    100% { transform:scale(1); opacity:0.78; }
  }
  .bar-track { height: 11px; overflow: hidden; border-radius: 999px; background: #EEF3F1; }
  .bar-fill { height: 100%; width: 0; border-radius: inherit; transition: width 420ms ease; }
  .bar-stress      { background: var(--col-stress); }
  .bar-burnout     { background: var(--col-burnout); }
  .bar-environment { background: var(--col-environment); }
  .bar-leaving     { background: var(--col-leaving); }

  /* AI BOX */
  .ai-box {
    min-height: 130px;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #FBFDFD;
  }
  .ai-title {
    display: flex; justify-content: space-between; gap: 10px;
    margin-bottom: 10px; color: var(--accent);
    font-size: 11px; font-weight: 900;
  }
  .answered { color: var(--muted); font-size: 11px; font-weight: 800; }
  .ai-comment { font-size: 14px; font-weight: 700; line-height: 1.7; min-height: 60px; }
  .cursor {
    display: inline-block; width: 8px; height: 1.05em; margin-left: 3px;
    background: var(--accent); vertical-align: -0.16em;
    animation: blink 780ms steps(2,start) infinite;
  }  @keyframes blink { 50% { opacity:0; } }

  /* ===== RESULT PAGE ===== */
  .result-page {
    width: min(1180px, calc(100% - 32px));
    margin: 32px auto;
    display: grid;
    gap: 20px;
  }
  .result-panel, .result-card, .chat-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .result-panel { padding: 30px; }
  .result-header {
    display: grid;
    grid-template-columns: minmax(0,1fr) auto;
    gap: 18px; align-items: start;
  }
  .result-kicker { color: var(--navy); font-size: 12px; font-weight: 800; margin-bottom: 8px; }
  .result-title {
    font-size: clamp(28px,4vw,44px);
    line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 10px;
  }
  .result-lead { max-width: 720px; color: var(--muted); font-size: 15px; font-weight: 650; line-height: 1.8; }
  .result-total-box {
    min-width: 130px; padding: 16px; text-align: center;
    border: 1px solid var(--sand-3); border-radius: 12px; background: var(--sand-1);
  }
  .result-total-num { display: block; font-size: 46px; line-height: 1; color: var(--accent); font-weight: 900; }
  .result-total-label { color: var(--muted); font-size: 11px; font-weight: 900; }

  .score-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 14px;
  }
  .result-card { padding: 18px; }
  .card-label { color: var(--muted); font-size: 12px; font-weight: 900; margin-bottom: 10px; }
  .card-score { display: flex; align-items: baseline; gap: 5px; margin-bottom: 10px; }
  .card-score strong { font-size: 34px; line-height: 1; font-weight: 900; }
  .card-score span { color: var(--muted); font-weight: 800; }

  .section-title { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 14px; }
  .analysis-text { color: var(--muted); font-size: 15px; font-weight: 650; line-height: 1.85; white-space: pre-wrap; }
  .reassurance {
    margin-top: 14px; padding: 12px 14px;
    border-radius: 10px; background: var(--sand-2);
    color: var(--sand-dark); font-size: 13px; font-weight: 800;
    border: 1px solid var(--sand-3);
  }

  .task-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
  .task-card {
    display: grid; grid-template-columns: 26px minmax(0,1fr); gap: 12px;
    align-items: start; min-height: 110px; padding: 16px;
    border: 1px solid var(--line); border-radius: 12px;
    background: #fff; cursor: pointer;
    transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    text-align: left;
  }
  .task-card:hover { border-color: rgba(29,158,117,0.5); transform: translateY(-1px); }
  .task-card.done { border-color: var(--accent); background: var(--accent-soft); }
  .task-check {
    display: grid; place-items: center;
    width: 26px; height: 26px;
    border: 2px solid #CBD7D2; border-radius: 8px;
    color: #fff; font-size: 16px; font-weight: 900;
    transition: border-color 180ms, background 180ms;
  }
  .task-card.done .task-check { border-color: var(--accent); background: var(--accent); }
  .task-title { font-size: 14px; font-weight: 900; line-height: 1.45; margin-bottom: 5px; }
  .task-desc { color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.6; }

  /* SIM */
  .sim-note { color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 16px; }
  .sim-list { display: grid; gap: 16px; }
  .sim-row { display: grid; grid-template-columns: 120px minmax(0,1fr); gap: 12px; align-items: center; }
  .sim-name { font-size: 12px; font-weight: 900; }
  .sim-bars { display: grid; gap: 7px; }
  .sim-line {
    display: grid; grid-template-columns: 48px minmax(0,1fr) 36px;
    gap: 8px; align-items: center;
    color: var(--muted); font-size: 11px; font-weight: 800;
  }
  .sim-track { height: 10px; overflow: hidden; border-radius: 999px; background: #EEF3F1; }
  .sim-fill { height: 100%; width: 0; border-radius: inherit; background: #AAB8B3; transition: width 480ms ease; }
  .sim-fill.improved { background: var(--accent); }

  /* CTA */
  .cta-card {
    background: var(--sand-2);
    border: 1px solid var(--sand-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 30px;
    text-align: center;
  }
  .cta-title { font-size: 15px; font-weight: 800; color: var(--sand-dark); margin-bottom: 8px; }
  .cta-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }

  .result-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .wide-btn { min-width: 200px; }

  /* CHAT */
  .chat-panel {
    display: grid;
    grid-template-rows: auto minmax(180px,auto) auto;
    min-height: 380px;
    padding: 22px;
  }
  .chat-head {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 0;
  }
  .chat-context { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 4px; }
  .chat-log { display: grid; align-content: start; gap: 10px; padding: 16px 0; }
  .bubble {
    max-width: 84%; padding: 11px 14px; border-radius: 12px;
    font-size: 13px; font-weight: 700; line-height: 1.65; white-space: pre-wrap;
  }
  .bubble.ai { justify-self: start; background: var(--sand-1); color: var(--sand-dark); border: 1px solid var(--sand-2); }
  .bubble.user { justify-self: end; background: var(--accent); color: #FFF8F0; }
  .bubble.crisis { justify-self: start; background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
  .typing-dots {
    display: flex; gap: 4px; padding: 12px 14px;
    justify-self: start; background: var(--accent-soft);
    border-radius: 12px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .chat-form {
    display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px;
    align-items: center; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .chat-input {
    min-height: 46px; padding: 0 14px;
    border: 1px solid var(--line); border-radius: 10px;
    background: #fff; color: var(--text); outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(192,90,46,0.1); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; width: min(100% - 22px, 700px); margin: 16px auto; }
    .question-area { min-height: auto; padding: 22px; }
    .result-page { width: min(100% - 22px, 700px); margin: 16px auto; }
    .result-header, .score-grid, .task-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 520px) {
    .total-card { grid-template-columns: 1fr; }
    .floating-delta { justify-self: start; }
    .axis-top { grid-template-columns: minmax(0,1fr) auto; }
    .nav, .result-actions { flex-direction: column; }
    .btn, .wide-btn { width: 100%; }
    .chat-form { grid-template-columns: 1fr; }
    .bubble { max-width: 100%; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-logo">Worelu</div>
    <div class="site-tagline">無料ストレスチェック</div>
  </div>
  <div class="site-right">仕事で壊れる前に。</div>
</header>

<main class="app" id="app">
  <section class="question-area" aria-labelledby="qText">
    <div class="intro-block" id="introBlock">
      <h1>仕事ストレスチェック診断</h1>
      <p>仕事・心身・燃え尽き・転職意向を、AIがリアルタイム分析します。</p>
      <div class="intro-chips">
        <span class="intro-chip">✓ 無料</span>
        <span class="intro-chip">✓ 登録不要</span>
        <span class="intro-chip">✓ AIアドバイス付き</span>
      </div>
    </div>
    <div class="topline">
      <div class="kicker">WORK STRESS CHECK</div>
      <div class="q-count" id="qNum">Q1 / 10</div>
    </div>
    <div class="progress" aria-label="進捗">
      <div class="progress-fill" id="progFill"></div>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optList"></div>
    <div class="nav">
      <button class="btn" id="btnBack" type="button" onclick="goBack()" disabled>戻る</button>
      <button class="btn primary" id="btnNext" type="button" onclick="goNext()" disabled>次へ</button>
    </div>
  </section>

  <aside class="preview-panel" aria-label="リアルタイム分析">
    <div class="preview-head">
      <div class="live-label"><span class="live-dot"></span>リアルタイム分析</div>
      <div class="risk-pill" id="riskLabel">低め</div>
    </div>
    <div class="total-card">
      <div>
        <div class="total-label">総合ストレス指数</div>
        <div class="total-score-row">
          <span class="score-number" id="totalNum">0</span>
          <span class="score-unit">/100</span>
        </div>
      </div>
      <div class="floating-delta" id="totalDelta"></div>
    </div>
    <div class="axes" id="axisList"></div>
    <div class="ai-box">
      <div class="ai-title">
        <span>AI COMMENT</span>
        <span class="answered" id="answeredCount">未回答 0/10</span>
      </div>

/* ===== 状態 ===== */
let cur = 0;
let answers = new Array(QUESTIONS.length).fill(-1);
let rawScores = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
let prevRaw   = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
let typeTimer = null;

/* ===== 初期化：軸リスト構築 ===== */
function buildAxisList() {
  const list = document.getElementById('axisList');
  list.innerHTML = '';
  AXES.forEach(a => {
    const item = document.createElement('div');
    item.className = 'axis-item';
    item.dataset.axis = a.key;
    item.innerHTML = `
      <div class="axis-top">
        <div class="axis-name">${a.label}</div>
        <div class="axis-val" id="val-${a.key}">0</div>
        <div class="axis-delta" id="delta-${a.key}">±0</div>
      </div>
      <div class="bar-track"><div class="bar-fill bar-${a.key}" id="bar-${a.key}"></div></div>
    `;
    list.appendChild(item);
  });
}

/* ===== ユーティリティ ===== */
function clamp(v) { return Math.min(100, Math.max(0, Math.round(v))); }
function rawToNorm(raw) {
  return {
    stress:      clamp(raw.stress      / MAX_RAW.stress      * 100),
    burnout:     clamp(raw.burnout     / MAX_RAW.burnout     * 100),
    environment: clamp(raw.environment / MAX_RAW.environment * 100),
    leaving:     clamp(raw.leaving     / MAX_RAW.leaving     * 100),
    engagement:  clamp(raw.engagement  / MAX_RAW.engagement  * 100)
  };
}
function getLevel(v) { if(v<25)return'low'; if(v<50)return'moderate'; if(v<75)return'high'; return'very_high'; }
function calcTotal(norm) { return clamp(norm.stress*0.32+norm.burnout*0.28+norm.environment*0.23+norm.leaving*0.17); }
function getDominant(norm) { return ['stress','burnout','environment','leaving'].reduce((a,b)=>norm[a]>=norm[b]?a:b); }
function answerToPoints(idx) { return [0,2.5,5,7.5,10][idx]; }

function calcRaw() {
  const s = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
  answers.forEach((ai,qi) => {
    if(ai<0) return;
    const pts = answerToPoints(ai);
    Object.keys(QUESTIONS[qi].weights).forEach(k => { s[k] += pts * QUESTIONS[qi].weights[k]; });
  });
  return s;
}

/* ===== 描画：質問 ===== */
function renderQuestion() {
  const intro = document.getElementById('introBlock');
  if(intro) intro.style.display = cur===0 ? '' : 'none';

  const q = QUESTIONS[cur];
  document.getElementById('qNum').textContent = `Q${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('progFill').style.width = ((cur+1)/QUESTIONS.length*100) + '%';
  document.getElementById('qText').textContent = q.text;
  document.getElementById('btnBack').disabled = cur===0;
  const nb = document.getElementById('btnNext');
  nb.textContent = cur===QUESTIONS.length-1 ? '完了' : '次へ';
  nb.disabled = answers[cur]<0;

  const ol = document.getElementById('optList');
  ol.innerHTML = '';
  q.opts.forEach((o,i) => {
    const lbl = document.createElement('label');
    lbl.className = 'option' + (answers[cur]===i?' selected':'');
    lbl.innerHTML = `<input type="radio" name="q${cur}" value="${i}" ${answers[cur]===i?'checked':''}><span class="opt-radio" aria-hidden="true"></span><span class="opt-text"><span class="opt-label">${o.label}</span><span class="opt-note">${o.note}</span></span>`;
    lbl.addEventListener('click', () => selectAnswer(i));
    ol.appendChild(lbl);
  });
}

function selectAnswer(idx) {
  if(answers[cur]===idx) return;
  prevRaw = {...rawScores};
  answers[cur] = idx;
  rawScores = calcRaw();
  renderQuestion();
  updatePreview(QUESTIONS[cur].comments[idx]);
}

/* ===== プレビュー更新 ===== */
function updatePreview(comment) {
  const answered = answers.filter(a=>a>=0).length;
  document.getElementById('answeredCount').textContent = `回答済み ${answered}/${QUESTIONS.length}`;

  if(answered===0) {
    document.getElementById('totalNum').textContent = '0';
    document.getElementById('totalDelta').textContent = '';
    document.getElementById('totalDelta').classList.remove('show');
    AXES.forEach(a => {
      document.getElementById('val-'+a.key).textContent = '0';
      document.getElementById('bar-'+a.key).style.width = '0%';
      document.getElementById('delta-'+a.key).textContent = '±0';
      document.getElementById('delta-'+a.key).className = 'axis-delta';
    });
    return;
  }

  const norm = rawToNorm(rawScores);
  const prevNorm = rawToNorm(prevRaw);
  const total = calcTotal(norm);
  const prevTotal = calcTotal(prevNorm);
  const totalDiff = total - prevTotal;

  const numEl = document.getElementById('totalNum');
  numEl.textContent = total;
  numEl.classList.remove('bump');
  requestAnimationFrame(() => numEl.classList.add('bump'));
  setTimeout(() => numEl.classList.remove('bump'), 260);

  const deltaEl = document.getElementById('totalDelta');
  deltaEl.textContent = totalDiff===0 ? '±0' : (totalDiff>0?'↑':'↓')+Math.abs(totalDiff);
  deltaEl.style.color = totalDiff>0 ? 'var(--danger)' : totalDiff<0 ? 'var(--accent)' : 'var(--muted)';
  deltaEl.classList.remove('show');
  requestAnimationFrame(() => deltaEl.classList.add('show'));

  const riskLabel = document.getElementById('riskLabel');
  riskLabel.textContent = total>=72?'高リスク':total>=46?'注意':'低め';

  AXES.forEach(a => {
    const v = norm[a.key], pv = prevNorm[a.key];
    const diff = v - pv;
    document.getElementById('val-'+a.key).textContent = v;
    document.getElementById('bar-'+a.key).style.width = v+'%';
    const d = document.getElementById('delta-'+a.key);
    d.textContent = diff===0 ? '±0' : (diff>0?'↑':'↓')+Math.abs(diff);
    d.className = 'axis-delta' + (diff>0?' delta-up':diff<0?' delta-down':'');
    d.classList.remove('delta-pop');
    requestAnimationFrame(() => d.classList.add('delta-pop'));
  });

  if(comment) typeComment(comment);
}

function typeComment(text) {
  if(typeTimer) clearInterval(typeTimer);
  const el = document.getElementById('aiComment');
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    if(i<text.length) { el.textContent += text[i++]; }
    else clearInterval(typeTimer);
  }, 22);
}

function goNext() {
  if(answers[cur]<0) return;
  if(cur<QUESTIONS.length-1) { cur++; renderQuestion(); }
  else renderResultPage();
}
function goBack() { if(cur>0) { cur--; renderQuestion(); } }

/* ===== 結果ページ ===== */
function buildAnalysisContext(norm) {
  const ctx = {scores:{},subScores:{}};
  ['stress','burnout','environment','leaving','engagement'].forEach(k => {
    ctx.scores[k] = {value:norm[k],level:getLevel(norm[k])};
  });
  return ctx;
}

function getHeroTitle(dominant) {
  return {stress:'仕事ストレスが高い状態です',burnout:'燃え尽き傾向が見られます',environment:'職場環境への負担が大きい状態です',leaving:'転職意向が高まっています'}[dominant];
}

function getAiAnalysis(ctx) {
  const s = ctx.scores;
  const lines = [];
  if(s.stress.level==='very_high'||s.stress.level==='high') {
    if(s.environment.level==='high'||s.environment.level==='very_high') lines.push('業務量や職場環境への負担が、ストレスの主な原因になっています。');
    else lines.push('業務そのものよりも、自身のコンディションや働き方の影響が大きい可能性があります。');
  }
  if(s.burnout.level==='high'||s.burnout.level==='very_high') {
    if(s.leaving.level==='low'||s.leaving.level==='moderate') lines.push('辞めたい気持ちはまだ強くない一方で、仕事への意欲や意味が薄れています。まずは業務負荷の調整から始めることが有効です。');
    else if(s.engagement.value<40) lines.push('疲労だけでなく、仕事への希望も薄れている状態です。まず休息を最優先にしてください。');
    else lines.push('現在は消耗していますが、仕事への意味はまだ残っています。改善できる余力は十分あります。');
  }
  if((s.leaving.level==='high'||s.leaving.level==='very_high')&&(s.stress.level==='low'||s.stress.level==='moderate')) lines.push('身体的な疲弊よりも、キャリアへの迷いが転職意向を高めているようです。');
  if((s.environment.level==='high'||s.environment.level==='very_high')&&s.engagement.value>=50) lines.push('仕事内容よりも組織や人間関係が主な負担になっています。仕事への意欲は残っているので、環境が変われば改善しやすい状態です。');
  if(lines.length===0) lines.push('今の状態は複数の要因が絡み合っています。まずは一番気になる点から、小さく改善を試みてください。');
  return lines.join('\n\n');
}

function renderResultPage() {
  const norm = rawToNorm(rawScores);
  const ctx = buildAnalysisContext(norm);
  const dominant = getDominant(norm);

  const tasks = TASKS_BY_DOMINANT[dominant];
  const analysis = getAiAnalysis(ctx);
  const total = calcTotal(norm);
  const simRate = {stress:0.78,burnout:0.76,environment:0.80,leaving:0.82};

  const rp = document.getElementById('resultPage');
  rp.innerHTML = `
    <section class="result-panel">

        <div>
          <div class="result-kicker">DIAGNOSIS RESULT</div>
          <h1 class="result-title">${getHeroTitle(dominant)}</h1>

        </div>
        <div class="result-total-box">
          <strong class="result-total-num">${total}</strong>
          <span class="result-total-label">総合ストレス指数</span>
        </div>
      </div>
    </section>

    <div class="score-grid">
      ${AXES.map(a=>`
        <article class="result-card">
          <p class="card-label">${a.label}</p>
          <div class="card-score"><strong style="color:${a.color}">${norm[a.key]}</strong><span>/100</span></div>
          <div class="bar-track"><div class="bar-fill bar-${a.key}" style="width:${norm[a.key]}%"></div></div>
        </article>
      `).join('')}
    </div>

    <section class="result-panel">
      <h2 class="section-title">AI分析</h2>
      <p class="analysis-text" id="analysisText"></p>
      <div class="reassurance">こうした状態は、責任感が強く仕事に真剣に向き合う人に多く見られます。あなただけではありません。</div>
    </section>

    <section class="result-panel">
      <h2 class="section-title">今週やること 3つ</h2>
      <div class="task-grid">
        ${tasks.map(t=>`
          <button class="task-card" type="button" onclick="this.classList.toggle('done');this.querySelector('.task-check').textContent=this.classList.contains('done')?'✓':'';">
            <span class="task-check"></span>
            <span>
              <p class="task-title">${t.title}</p>
              <p class="task-desc">${t.desc}</p>
            </span>
          </button>
        `).join('')}
      </div>
    </section>

    <section class="result-panel">
      <h2 class="section-title">改善シミュレーション</h2>
      <p class="sim-note">予測ではなく参考イメージです。今週の行動で負荷が少し下がった場合の見え方として表示しています。</p>
      <div class="sim-list">
        ${AXES.map(a=>{
          const after=clamp(Math.round(norm[a.key]*simRate[a.key]));
          return `<div class="sim-row">
            <div class="sim-name">${a.label}</div>
            <div class="sim-bars">
              <div class="sim-line"><span>現在</span><div class="sim-track"><div class="sim-fill" style="width:${norm[a.key]}%"></div></div><span>${norm[a.key]}</span></div>
              <div class="sim-line"><span>参考</span><div class="sim-track"><div class="sim-fill improved" style="width:${after}%"></div></div><span>${after}</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </section>

    <div class="result-actions">
      <button class="btn primary wide-btn" type="button" onclick="resetApp()">もう一度診断する</button>
    </div>

    <section class="chat-panel" aria-label="AIコーチチャット">
      <div class="chat-head">
        <div>
          <div class="kicker">AI COACH CHAT</div>
          <div class="chat-context">診断コンテキスト：${axisLabels[dominant]} ${norm[dominant]}（${LEVEL_LABELS[ctx.scores[dominant].level]}）/ ${axisLabels[second]} ${norm[second]}（${LEVEL_LABELS[ctx.scores[second].level]}）/ 総合 ${total}</div>
        </div>
        <div class="risk-pill">結果連動</div>
      </div>
      <div class="chat-log" id="chatMsgs">
        <div class="bubble ai">${getHeroTitle(dominant)}という結果が出ました。何か具体的に気になっていることや、相談したいことはありますか？</div>
      </div>
      <div class="chat-form">
        <input class="chat-input" id="chatInput" type="text" placeholder="例：残業が減らせない、転職すべきか迷っている" autocomplete="off">
        <button class="btn primary" type="button" onclick="sendChat()">送る</button>
      </div>
    </section>
  `;

  document.getElementById('app').classList.add('hidden');
  rp.classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
  setChatContext(dominant, norm, total);

  const el = document.getElementById('analysisText');
  el.textContent = '';
  let i = 0;
  const t = setInterval(()=>{ if(i<analysis.length){el.textContent+=analysis[i++];}else clearInterval(t); },16);
}

/* ===== チャット ===== */
const CRISIS_WORDS = ['消えたい','死にたい','生きるのがつらい','もう終わりたい','全部終わらせたい','いなくなりたい','消えてしまいたい','楽になりたい','死んでしまいたい','自殺','死ぬ','終わりにしたい','生きていたくない'];
const BURNOUT_WORDS = ['限界','眠れない','涙が出','泣けてく','泣いてしまう','動悸','吐き気','胃が痛い','適応障害','メンタル限界','心が折れた','起き上がれない','体が動かない','しんどすぎ','もう無理かも','うつ','バーンアウト','燃え尽き','休職','病院','メンタルクリニック'];
const CRISIS_REPLY = `今とてもつらい状況にあることが伝わってきました。\n\n一人で抱え込まず、信頼できる人や専門の相談窓口へ今すぐ相談してください。\n\n【相談窓口】\n・よりそいホットライン：0120-279-338（24時間）\n・こころの健康相談統一ダイヤル：0570-064-556\n・緊急性が高い場合は119番または最寄りの救急窓口\n\nもし今ここで気持ちを話したければ、私はあなたの話を聞きます。`;

/* ===== ① キーワード辞書（拡充版） ===== */
const KEYWORD_MAP = [
  {
    keys: ['残業','長時間','残業代','サービス残業','終わらない','仕事が多','タスク','業務量','キャパ','仕事量','締切','納期','忙しい','仕事が増','仕事が終わらない','こなせない','オーバー'],
    reply: '業務の負荷が高い状態が続いているようです。\n\nまず今日の仕事を全部書き出して「自分しかできないもの」と「今日でなくていいもの」に分けてみてください。後者を1つだけ後回しにするだけで、かなり楽になります。\n\n上司に相談するなら「業務量を減らして」より「優先順位を一緒に整理したい」という言い方の方が動いてもらいやすいです。もし断れない状況なら、「今週はA・B・Cのどれを優先すべきですか？」と選択肢を絞る形で聞くのが有効です。'
  },

    reply: '相談できる環境がないのは、じわじわと消耗する状況です。\n\n職場の全員と仲良くする必要はありません。まず「この人には少し話せる」という人を1人だけ決めて、そこから小さく始めてみてください。\n\n社内に誰もいなければ、産業医・外部相談窓口・信頼できる社外の知人への相談も立派な選択肢です。一人で抱えることだけは避けてください。'
  },
  {
    keys: ['コミュニケーション','話し合い','意思疎通','伝わらない','噛み合わない','会話','ミーティング','会議','連携','報告','まともな話し合い','話が通じない','言っても変わらない'],
    reply: 'コミュニケーションがうまくいかないとき、原因は「タイミング」「伝え方」「相手との相性」の3つのどれかです。\n\n試してみてほしいこと：話したいことを「事実」「困っていること」「お願いしたいこと」の3つに分けて短く書いてから伝えると、受け取られ方がかなり変わります。\n\n話し合い自体が機能しない状況なら、人事・産業医・上位の上司を通じた第三者介入も選択肢に入れていいです。'
  },
  {
    keys: ['教えてもらえない','教わる時間','覚えられない','ついていけない','追いつかない','わからない','未経験','新しい業務','入社','新人','忙しくて教わる','教えてもらう時間'],
    reply: '覚えることが多い・教えてもらう時間がないという状況は、能力の問題ではなく「量と環境のミスマッチ」です。\n\n今日から試せること：「今日1つだけ覚える」に絞ってみてください。全部覚えようとするより、確実に身につく1つを積み上げる方が早く追いつけます。\n\n聞きにくい雰囲気なら、質問をまとめてから一度に聞くスタイルに切り替えると相手の負担も減ります。状況が改善しないなら、上司に「教わる時間を確保してほしい」と一度明示的に伝えることも必要です。'
  },
  {
    keys: ['上司','マネージャー','部長','課長','上の人','上長','リーダー','上司と合わない','怖い','威圧','パワハラ','怒鳴','上司が','上司に','あいません','合いません'],
    reply: '上司との関係でのストレスは、直接対立より「業務上の課題」として伝える方が動きやすいです。\n\n「〇〇が難しい状況です、優先順位を一緒に整理させてください」という形で、感情ではなく事実と要望を伝えるのがポイントです。\n\nパワハラや威圧的な言動がある場合は、記録をつけておくことと、人事・産業医・社外相談窓口への相談を並行して進めてください。'
  },
  {
    keys: ['人間関係','同僚','チーム','雰囲気','派閥','陰口','無視','孤立感','居場所','仲間外れ','ギスギス','職場の空気'],
    reply: '職場の人間関係の負荷は、ストレスの中でも特に消耗しやすいタイプです。\n\nまず「この人といると少し楽」という人を1人だけ探して、そこを安全地帯にすることが先決です。全員と仲良くしようとしなくていいです。\n\n居場所がないと感じるほどであれば、環境を変えることも含めて真剣に考えていい段階かもしれません。今の職場が全てではありません。'
  },
  {
    keys: ['評価','昇進','昇格','査定','フィードバック','成果が見えない','認められない','報われない','正当に評価','評価されない','見てもらえない'],
    reply: '評価されていないと感じるとき、原因は「成果が出ていない」「成果が見えていない」「評価者との認識のズレ」の3つのどれかです。\n\nまず上司が何を見て評価しているかを確認してみてください。自分が頑張っていることと、評価される指標がズレていることはよくあります。\n\n「成果の見せ方」を変えるだけで評価が変わることは多いです。1on1などで「自分の貢献として何が評価されていますか？」と直接聞くのも有効です。'

    reply: '給与への不満は、「市場価値と自社の評価がズレている」か「評価制度そのものへの問題」のどちらかが多いです。\n\nまず転職サイト（リクナビNEXT・マイナビ転職など）で同職種・同年齢・同地域の相場を調べてみてください。市場価値より低いなら交渉または転職の根拠になります。\n\n相場通りであれば、評価制度を変えるか、より高く評価してくれる場所を探すかの2択です。給料だけを理由に転職する場合は、残業時間・福利厚生・安定性とのトレードオフも必ず確認してください。'
  },

    reply: '転職を考えるのは自然なことです。\n\nただ「今の職場が嫌」と「転職先が良い」は別の問題です。まず変えたいものが「仕事内容」「職場環境」「人間関係」「給料」のどれなのかを特定してから動くと、転職後の後悔が少なくなります。\n\n転職エージェントへの相談は無料でできるので、今すぐ転職するつもりがなくても市場価値を確認するために使うのはアリです。'
  },
  {
    keys: ['やる気','モチベーション','意欲','気力','やる気が出ない','やる気がない','仕事したくない','気が重い','行きたくない','仕事が嫌になった','やりたくない'],
    reply: 'やる気が出ないのは意志の問題ではなく、疲労・目的のズレ・評価への不満などのサインです。\n\nまず「何に対してやる気が出ないのか」を特定してみてください。仕事全体なのか、特定の業務なのか、特定の人との関係なのかで対処が変わります。\n\n疲れが原因であれば回復が先決です。やりがいのなさが原因であれば、仕事の中で「自分が決められること」を1つ増やすだけでも変わることがあります。'
  },
  {
    keys: ['休みたい','休息','疲れた','しんどい','きつい','つらい','もう限界','余裕がない','余裕ない','消耗','ぐったり','ボロボロ'],
    reply: '疲れをしっかり感じているということは、それだけ頑張ってきたということです。\n\n「休むのは逃げ」ではなく、回復して次に動くための必要なステップです。\n\nまず今週、1日だけ意識的に「仕事のことを考えない時間」を30分作ってみてください。症状が身体に出ているなら、早めに医療機関に相談してください。'
  },
  {
    keys: ['キャリア','将来','スキル','成長','このまま','先が見えない','方向性','何がしたいか','やりたいこと','目標','キャリアアップ','専門性'],
    reply: 'キャリアへの不安は、多くの場合「今の自分の棚卸しができていない」ことから来ています。\n\nまず現職でのスキルと経験を箇条書きで書き出してみてください。意外と選択肢があることに気づけます。\n\n「何がしたいかわからない」という状態なら、転職エージェントへの相談が意外と整理になることもあります。他社からどう見えるかを知るだけで視野が広がります。'
  }
];

/* ===== ② スコア連動のdefaultレスポンス ===== */
let chatContext = { dominant:'stress', norm:{stress:0,burnout:0,environment:0,leaving:0}, total:0 };

function setChatContext(dominant, norm, total) {
  chatContext = { dominant, norm, total };
}

function getContextualDefault() {
  const { dominant, norm, total } = chatContext;
  if(total < 30) {
    return '今の状態は比較的安定しているようです。\n\nこのコンディションを維持するために、休息のリズムと相談できる環境を崩さないことが大切です。\n\n気になっていることがあれば、もう少し具体的に教えてもらえますか？';
  }
  if(dominant === 'burnout') {
    return '診断結果では燃え尽き傾向が強く出ています。\n\n「頑張り続けること」より「回復すること」を今は優先してください。\n\n具体的にどんなことが一番消耗しているか教えてもらえますか？仕事量なのか、人間関係なのか、意味が感じられないのか、によって対処が変わります。';
  }
  if(dominant === 'leaving') {
    return '診断結果では転職意向が高めに出ています。\n\n辞めることを急いで決める必要はありませんが、今の状況を整理しておくことは大事です。\n\n「変えたいもの」が仕事内容なのか、職場環境なのか、人間関係なのか、給料なのか、教えてもらえますか？';
  }
  if(dominant === 'environment') {
    return '診断結果では職場環境への負担が強く出ています。\n\n人間関係・評価・業務量のうち、どれが一番消耗していますか？\n\n具体的に教えてもらえると、今できることをより絞って伝えられます。';
  }
  return '今おっしゃっていることは、多くの働く人が感じていることです。\n\nもう少し具体的に教えてもらえますか？「残業が多い」「上司と合わない」「やる気が出ない」など、一番気になっていることを入れてもらうと、より具体的にお伝えできます。';
}

function classifyInput(text) {
  if(CRISIS_WORDS.some(w=>text.includes(w))) return 'crisis';
  if(BURNOUT_WORDS.some(w=>text.includes(w))) return 'burnout';
  return 'normal';
}

function getBurnoutReply(text) {
  const map = {
    '限界':'限界を感じているときは「もっと頑張ろう」ではなく、まず「止まること」が最優先です。\n\n今週の3つ：\n① 有給または半休を1日取る計画を立てる\n② 信頼できる人に今の状態を話す\n③ 気になる症状があれば、かかりつけ医か内科を受診する',
    '眠れない':'眠れない状態が続くと、判断力・感情・体力すべてが低下します。\n\n今週の3つ：\n① 就寝1時間前にスマホ・PCを閉じる\n② 仕事のことを考えそうになったらメモに書き出す\n③ 2週間改善しなければ、内科またはメンタルクリニックへの相談を検討する',
    '涙が出':'涙が出るのは、心が「もう十分すぎるほど頑張った」と言っているサインです。\n\n弱いのではありません。限界まで頑張ってきた証拠です。\n\n① 今日だけは「仕事のことを考えない時間」を30分作る\n② 信頼できる人に「最近しんどい」と一言だけ話してみる',
    '動悸':'動悸・吐き気・胃の痛みなど身体症状が出ているなら、それは精神的負荷が身体限界に達しているサインです。\n\n① まず内科を受診して身体的な問題がないか確認する\n② 可能であれば1〜2日休む\n③ 職場の産業医または上司に「体調不良」として相談する',
    'default':'心身に強い負荷がかかっている状態です。今は「解決」より「回復」を優先してください。\n\n産業医・メンタルクリニック・よりそいホットライン（0120-279-338）も活用できます。'
  };
  for(const [k,v] of Object.entries(map)) { if(k!=='default'&&text.includes(k)) return v; }
  return map.default;
}

function getNormalReply(text) {
  for(const entry of KEYWORD_MAP) {
    if(entry.keys.some(k=>text.includes(k))) return entry.reply;
  }
  return getContextualDefault();
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const val = inp.value.trim();
  if(!val) return;
  const msgs = document.getElementById('chatMsgs');

  const ub = document.createElement('div');
  ub.className = 'bubble user';
  ub.textContent = val;
  msgs.appendChild(ub);
  inp.value = '';

  const typing = document.createElement('div');
  typing.className = 'typing-dots';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  const level = classifyInput(val);
  const delay = level==='crisis'?400:800;

  setTimeout(()=>{
    typing.remove();
    const rb = document.createElement('div');
    rb.className = level==='crisis' ? 'bubble crisis' : 'bubble ai';
    rb.textContent = level==='crisis' ? CRISIS_REPLY : level==='burnout' ? getBurnoutReply(val) : getNormalReply(val);
    msgs.appendChild(rb);
    msgs.scrollTop = msgs.scrollHeight;
  }, delay);
}

function resetApp() {
  cur = 0;
  answers = new Array(QUESTIONS.length).fill(-1);
  rawScores = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
  prevRaw   = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderQuestion();
  updatePreview('');
  window.scrollTo(0,0);
}

/* ===== 初期化 ===== */
buildAxisList();
renderQuestion();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕事ストレスチェック</title>
<style>
  :root {
    --accent: #1D9E75;
    --accent-dark: #0F6E56;
    --accent-light: #E1F5EE;
    --accent-border: #9FE1CB;
    --bg: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #f0efeb;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --border: rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.15);
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --col-stress: #E24B4A;
    --col-burnout: #EF9F27;
    --col-environment: #378ADD;
    --col-leaving: #7F77DD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .hidden { display: none !important; }

  /* HEADER */
  .site-header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.02em; }
  .site-tagline { font-size: 12px; color: var(--text-tertiary); }

  /* APP LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    max-width: 900px;
    margin: 24px auto;
    padding: 0 16px;
  }

  /* QUESTION PANEL */
  .question-panel {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 480px;
  }
  .q-meta { display: flex; align-items: center; justify-content: space-between; }
  .q-num { font-size: 13px; color: var(--text-tertiary); font-weight: 500; }
  .q-pct { font-size: 12px; color: var(--accent); font-weight: 600; }
  .progress-wrap { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .q-text { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.5; letter-spacing: -0.02em; }
  .q-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--accent-dark);
    background: var(--accent-light);
    border: 0.5px solid var(--accent-border);
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: 500;
  }
  .options { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }
  .opt:hover { border-color: var(--accent); background: var(--accent-light); }
  .opt.selected { border-color: var(--accent); background: var(--accent-light); }
  .opt-radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border-md);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .opt.selected .opt-radio { background: var(--accent); border-color: var(--accent); }
  .opt.selected .opt-radio::after { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
  .opt-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .opt-note { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .opt.selected .opt-label { color: var(--accent-dark); }
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 8px; border-top: 0.5px solid var(--border);
  }
  .btn {
    padding: 9px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--border-md); background: transparent;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { background: var(--bg-tertiary); color: var(--text-tertiary); border-color: var(--border); }

  /* LIVE PREVIEW */
  .preview-panel {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    align-self: start; position: sticky; top: 24px;
  }
  .preview-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 4px; }
  .preview-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .total-score-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  .total-ring {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid var(--bg-tertiary);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: border-color 0.4s;
  }
  .total-num { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; transition: all 0.4s; }
  .total-label { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
  .axes { display: flex; flex-direction: column; gap: 10px; }
  .axis-item { display: flex; flex-direction: column; gap: 4px; }
  .axis-top { display: flex; justify-content: space-between; align-items: center; }
  .axis-name { font-size: 12px; color: var(--text-secondary); }
  .axis-right { display: flex; align-items: center; gap: 6px; }
  .axis-val { font-size: 14px; font-weight: 600; color: var(--text); min-width: 24px; text-align: right; }
  .axis-delta { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; min-width: 28px; text-align: center; transition: all 0.2s; }
  .delta-up { background: #FAECE7; color: #993C1D; }
  .delta-down { background: var(--accent-light); color: #085041; }
  .delta-none { background: var(--bg-tertiary); color: var(--text-tertiary); }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .delta-pop { animation: pop 0.3s ease; }
  .bar-track { height: 7px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 7px; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); width: 0%; }
  .bar-stress { background: var(--col-stress); }
  .bar-burnout { background: var(--col-burnout); }
  .bar-environment { background: var(--col-environment); }
  .bar-leaving { background: var(--col-leaving); }
  .divider { height: 0.5px; background: var(--border); }
  .ai-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; }
  .ai-comment { font-size: 12px; color: var(--text-secondary); line-height: 1.7; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px 12px; min-height: 60px; }

  /* RESULT PAGE */
  .result-page { max-width: 720px; margin: 24px auto; padding: 0 16px 48px; display: flex; flex-direction: column; gap: 16px; }
  .result-hero {
    background: var(--accent-light); border: 0.5px solid var(--accent-border);
    border-radius: var(--radius-lg); padding: 28px;
  }
  .result-hero-badge { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .result-hero-title { font-size: 22px; font-weight: 700; color: #04342C; line-height: 1.4; margin-bottom: 10px; letter-spacing: -0.02em; }
  .result-hero-desc { font-size: 14px; color: #0F6E56; line-height: 1.7; }
  .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 22px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 14px; }
  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .score-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; }
  .score-name { font-size: 11px; color: var(--text-secondary); }
  .score-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .score-bar { height: 5px; border-radius: 3px; margin-top: 4px; }
  .num-stress { color: var(--col-stress); }
  .num-burnout { color: var(--col-burnout); }
  .num-environment { color: var(--col-environment); }
  .num-leaving { color: var(--col-leaving); }
  .level-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; margin-top: 4px;
  }
  .level-low { background: #E1F5EE; color: #085041; }
  .level-moderate { background: #FAEEDA; color: #633806; }
  .level-high { background: #FAECE7; color: #712B13; }
  .level-very_high { background: #FCEBEB; color: #791F1F; }
  .why-box { background: #FAEEDA; border: 0.5px solid #FAC775; border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; color: #412402; line-height: 1.75; margin-bottom: 10px; }
  .safe-box { border-left: 3px solid var(--accent); padding: 10px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; border-radius: 0; }
  .tasks { display: flex; flex-direction: column; gap: 8px; }
  .task-card {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px; border: 0.5px solid var(--border);
    border-radius: var(--radius-md); cursor: pointer;
    transition: all 0.15s; background: var(--bg);
  }
  .task-card:hover { background: var(--bg-secondary); }
  .task-card.done { background: var(--accent-light); border-color: var(--accent-border); }
  .task-checkbox {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border-md); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .task-checkbox .check-icon { display: none; }
  .task-card.done .task-checkbox { background: var(--accent); border-color: var(--accent); }
  .task-card.done .task-checkbox .check-icon { display: block; }
  .task-body { flex: 1; }
  .task-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .task-card.done .task-title { color: #085041; }
  .task-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .sim-inner { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 16px; }
  .sim-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
  .sim-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sim-axis-name { font-size: 12px; color: var(--text-secondary); width: 76px; flex-shrink: 0; }
  .sim-track { flex: 1; height: 8px; background: var(--bg-tertiary); border-radius: 4px; position: relative; overflow: hidden; }
  .sim-bar-before { position: absolute; top: 0; left: 0; height: 8px; border-radius: 4px; opacity: 0.25; }
  .sim-bar-after { position: absolute; top: 0; left: 0; height: 8px; border-radius: 4px; }
  .sim-nums { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .sim-note { font-size: 11px; color: var(--text-tertiary); margin-top: 10px; line-height: 1.5; }
  .next-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .next-date { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-accent { padding: 10px 22px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-accent:hover { background: var(--accent-dark); }
  .btn-outline { padding: 10px 22px; background: transparent; color: var(--text-secondary); border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-outline:hover { background: var(--bg-secondary); }

  /* CHAT */
  .chat-wrap { display: flex; flex-direction: column; gap: 12px; }
  .chat-context { font-size: 12px; color: var(--text-tertiary); padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); line-height: 1.5; }
  .chat-messages { display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
  .bubble { padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.65; max-width: 88%; white-space: pre-wrap; }
  .bubble.ai { background: var(--bg-secondary); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .typing-dots { display: flex; gap: 4px; padding: 12px 14px; align-self: flex-start; background: var(--bg-secondary); border-radius: var(--radius-md); border-bottom-left-radius: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 10px 14px; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); font-size: 14px; color: var(--text); background: var(--bg); outline: none; font-family: inherit; transition: border-color 0.15s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .chat-send:hover { background: var(--accent-dark); }

  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
    .preview-panel { position: static; }
    .score-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">仕事ストレスチェック</div>
  <div class="site-tagline">仕事で壊れる前に。</div>
</header>

<div class="app" id="app">
  <div class="question-panel">
    <div>
      <div class="q-meta">
        <span class="q-num" id="qNum">Q1 / 10</span>
        <span class="q-pct" id="qPct">10%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progFill" style="width:10%"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="q-type-badge" id="qBadge"></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optList"></div>
    <div class="nav">
      <button class="btn" id="btnBack" onclick="goBack()" disabled>← 戻る</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>次へ →</button>
    </div>
  </div>

  <div class="preview-panel">
    <div>
      <div class="preview-badge">LIVE PREVIEW</div>
      <div class="preview-title">今の仕事コンディション</div>
    </div>
    <div class="total-score-wrap">
      <div class="total-ring" id="totalRing">
        <div class="total-num" id="totalNum">—</div>
        <div class="total-label">総合指数</div>
      </div>
    </div>
    <div class="axes">
      <div class="axis-item">
        <div class="axis-top">
          <span class="axis-name">仕事ストレス</span>
          <div class="axis-right">
            <span class="axis-val" id="val-stress">—</span>
            <span class="axis-delta delta-none" id="delta-stress">—</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-stress" id="bar-stress"></div></div>
      </div>
      <div class="axis-item">
        <div class="axis-top">
          <span class="axis-name">燃え尽き傾向</span>
          <div class="axis-right">
            <span class="axis-val" id="val-burnout">—</span>
            <span class="axis-delta delta-none" id="delta-burnout">—</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-burnout" id="bar-burnout"></div></div>
      </div>
      <div class="axis-item">
        <div class="axis-top">
          <span class="axis-name">職場環境</span>
          <div class="axis-right">
            <span class="axis-val" id="val-environment">—</span>
            <span class="axis-delta delta-none" id="delta-environment">—</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-environment" id="bar-environment"></div></div>
      </div>
      <div class="axis-item">
        <div class="axis-top">
          <span class="axis-name">転職意向</span>
          <div class="axis-right">
            <span class="axis-val" id="val-leaving">—</span>
            <span class="axis-delta delta-none" id="delta-leaving">—</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-leaving" id="bar-leaving"></div></div>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="ai-label">AIコメント</div>
      <div class="ai-comment" id="aiComment">回答するとリアルタイムで分析が始まります。</div>
    </div>
  </div>
</div>

<div class="result-page hidden" id="resultPage"></div>

<script>
/* ========== 軸定義 ========== */
const AXES = [
  { key: 'stress',      label: '仕事ストレス',  color: '#E24B4A', weight: 0.32 },
  { key: 'burnout',     label: '燃え尽き傾向',  color: '#EF9F27', weight: 0.28 },
  { key: 'environment', label: '職場環境',       color: '#378ADD', weight: 0.23 },
  { key: 'leaving',     label: '転職意向',       color: '#7F77DD', weight: 0.17 }
];

/* ========== 正規化用最大値 ========== */
/* 全問最悪回答（10点）時の各軸の生スコア合計 */
const MAX_RAW = {
  stress:      10*0.5 + 10*0.5 + 10*0.2 + 10*0.5 + 10*0.3 + 10*0.2 + 10*0.3,  // =25
  burnout:     10*0.2 + 10*0.2 + 10*0.8 + 10*0.8 + 10*0.3 + 10*0.5,           // =28
  environment: 10*0.8 + 10*0.8 + 10*0.8,                                        // =24
  leaving:     10*0.3 + 10*0.2 + 10*1.0 + 10*1.0 + 10*0.8,                    // =33
  engagement:  10*0.8 + 10*0.8 + 10*0.4 + 10*0.6 + 10*0.8                     // =34
};

/* ========== 10問定義 ========== */
/*
  weights: 各軸への寄与係数
  reverse: trueのとき回答値を反転（5→0, 4→2.5... 線形反転）
  type: 表示バッジ用（state=状態, cause=原因, action=行動）
*/
const QUESTIONS = [
  {
    text: '朝、仕事のことを考えると気が重くなる',
    type: 'state', reverse: false,
    opts: [
      { label: 'まったくない',     note: '仕事への憂鬱感はない' },
      { label: 'あまりない',       note: '多少あるが許容範囲' },
      { label: 'ときどきある',     note: '週に数回は感じる' },
      { label: 'よくある',         note: 'ほぼ毎日感じる' },
      { label: 'いつもある',       note: '毎朝のように感じる' }
    ],
    weights: { stress:0.5, burnout:0.2, environment:0.0, leaving:0.0, engagement:0.0 },
    comments: [
      '朝の仕事への気持ちは問題なさそうです。',
      '多少の憂鬱感はあるようです。',
      '朝の精神的負荷が少し気になります。',
      '仕事への憂鬱感が蓄積されています。',
      '朝から仕事の重さを感じている状態です。'
    ]
  },
  {
    text: '仕事中、消耗感や疲弊感を感じることが多い',
    type: 'state', reverse: false,
    opts: [
      { label: 'まったくない',     note: '仕事中のエネルギーは十分' },
      { label: 'あまりない',       note: 'たまに疲れる程度' },
      { label: 'ときどきある',     note: '週の半分くらいは感じる' },
      { label: 'よくある',         note: 'ほぼ毎日消耗している' },
      { label: 'いつもある',       note: '慢性的に疲弊している' }
    ],
    weights: { stress:0.5, burnout:0.2, environment:0.0, leaving:0.0, engagement:0.0 },
    comments: [
      'エネルギーは十分に保たれているようです。',
      '少し疲れが見られます。',
      '仕事中の消耗感が気になります。',
      '疲弊感が蓄積しています。注意が必要です。',
      '慢性的な消耗状態の可能性があります。'

/* ========== 状態 ========== */
let cur = 0;
let answers = new Array(QUESTIONS.length).fill(-1);
let rawScores = { stress:0, burnout:0, environment:0, leaving:0, engagement:0 };
let prevRaw   = { stress:0, burnout:0, environment:0, leaving:0, engagement:0 };
let typeTimer = null;

/* ========== ユーティリティ ========== */
function clamp(v) { return Math.min(100, Math.max(0, Math.round(v))); }

function rawToNorm(raw) {
  return {
    stress:      clamp(raw.stress      / MAX_RAW.stress      * 100),
    burnout:     clamp(raw.burnout     / MAX_RAW.burnout     * 100),
    environment: clamp(raw.environment / MAX_RAW.environment * 100),
    leaving:     clamp(raw.leaving     / MAX_RAW.leaving     * 100),
    engagement:  clamp(raw.engagement  / MAX_RAW.engagement  * 100)
  };
}

function getLevel(v) {
  if (v < 25) return 'low';
  if (v < 50) return 'moderate';
  if (v < 75) return 'high';
  return 'very_high';
}

const LEVEL_LABELS = { low:'低', moderate:'やや高', high:'高', very_high:'非常に高' };

function calcTotal(norm) {
  return clamp(
    norm.stress * 0.32 +
    norm.burnout * 0.28 +
    norm.environment * 0.23 +
    norm.leaving * 0.17
  );
}

function getDominant(norm) {
  return ['stress','burnout','environment','leaving'].reduce((a,b) => norm[a] >= norm[b] ? a : b);
}

/* 回答値（0-4）→ 10点スケール
   通常設問・逆スコア設問ともに、
   選択肢の並びを「良い(index 0)→ 悪い(index 4)」に統一しているため
   index をそのまま pts に対応させる。
   reverseフラグは選択肢の並び順制御に使用（スコア計算では不要）。
*/
function answerToPoints(answerIdx) {
  const pts = [0, 2.5, 5, 7.5, 10];
  return pts[answerIdx];
}

/* ========== スコア計算 ========== */
function calcRaw() {
  const s = { stress:0, burnout:0, environment:0, leaving:0, engagement:0 };
  answers.forEach((ai, qi) => {
    if (ai < 0) return;
    const q = QUESTIONS[qi];
    const pts = answerToPoints(ai);
    Object.keys(q.weights).forEach(k => { s[k] += pts * q.weights[k]; });
  });
  return s;
}

/* ========== 描画：診断画面 ========== */
function renderQuestion() {
  const q = QUESTIONS[cur];
  document.getElementById('qNum').textContent = `Q${cur+1} / ${QUESTIONS.length}`;
  const pct = Math.round((cur+1) / QUESTIONS.length * 100);
  document.getElementById('qPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('qBadge').textContent = TYPE_LABELS[q.type];
  document.getElementById('qText').textContent = q.text;
  document.getElementById('btnBack').disabled = cur === 0;
  const nb = document.getElementById('btnNext');
  nb.textContent = cur === QUESTIONS.length - 1 ? '結果を見る →' : '次へ →';
  nb.disabled = answers[cur] < 0;

  const ol = document.getElementById('optList');
  ol.innerHTML = '';
  q.opts.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (answers[cur] === i ? ' selected' : '');
    div.innerHTML = `<div class="opt-radio"></div><div><div class="opt-label">${o.label}</div><div class="opt-note">${o.note}</div></div>`;
    div.onclick = () => selectAnswer(i);
    ol.appendChild(div);
  });
}

function selectAnswer(idx) {
  prevRaw = { ...rawScores };
  answers[cur] = idx;
  rawScores = calcRaw();
  renderQuestion();
  updatePreview(QUESTIONS[cur].comments[idx]);
}

function updatePreview(comment) {
  const answered = answers.filter(a => a >= 0).length;
  if (answered === 0) {
    document.getElementById('totalNum').textContent = '—';
    ['stress','burnout','environment','leaving'].forEach(k => {
      document.getElementById('val-' + k).textContent = '—';
      document.getElementById('bar-' + k).style.width = '0%';
      const d = document.getElementById('delta-' + k);
      d.textContent = '—'; d.className = 'axis-delta delta-none';
    });
    document.getElementById('aiComment').textContent = '回答するとリアルタイムで分析が始まります。';
    return;
  }

  const norm = rawToNorm(rawScores);
  const prevNorm = rawToNorm(prevRaw);
  const total = calcTotal(norm);
  document.getElementById('totalNum').textContent = total;

  ['stress','burnout','environment','leaving'].forEach(k => {
    const v = norm[k], pv = prevNorm[k];
    document.getElementById('val-' + k).textContent = v;
    document.getElementById('bar-' + k).style.width = v + '%';
    const d = document.getElementById('delta-' + k);
    const diff = v - pv;
    if (diff > 0)      { d.textContent = '↑' + diff;           d.className = 'axis-delta delta-up'; }
    else if (diff < 0) { d.textContent = '↓' + Math.abs(diff); d.className = 'axis-delta delta-down'; }
    else               { d.textContent = v > 0 ? '±0' : '—';   d.className = 'axis-delta delta-none'; }
    d.classList.add('delta-pop');
    setTimeout(() => d.classList.remove('delta-pop'), 400);
  });

  if (comment) typeComment(comment);
}

function typeComment(text) {
  if (typeTimer) clearInterval(typeTimer);
  const el = document.getElementById('aiComment');
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    if (i < text.length) { el.textContent += text[i++]; }
    else clearInterval(typeTimer);
  }, 22);
}

function goNext() {
  if (answers[cur] < 0) return;
  if (cur < QUESTIONS.length - 1) { cur++; renderQuestion(); }
  else renderResultPage();
}

function goBack() {
  if (cur > 0) { cur--; renderQuestion(); }
}

/* ========== 結果ページ生成 ========== */
function buildAnalysisContext(norm) {
  const ctx = { scores: {}, subScores: {} };
  ['stress','burnout','environment','leaving','engagement'].forEach(k => {
    ctx.scores[k] = { value: norm[k], level: getLevel(norm[k]) };
  });
  QUESTIONS.forEach((q, i) => {
    const key = ['morningDread','exhaustion','achievement','workload','meaning','recognition','safety','quitFreq','jobSearch','futureVision'][i];
    ctx.subScores[key] = answers[i] >= 0 ? answerToPoints(answers[i]) : 0;
  });
  return ctx;
}

function classifyInput(text) {
  if (CRISIS_WORDS.some(w => text.includes(w))) return 'crisis';
  if (BURNOUT_WORDS.some(w => text.includes(w))) return 'burnout';
  return 'normal';
}

function getBurnoutReply(text) {
  const key = Object.keys(BURNOUT_REPLY).find(k => k !== 'default' && text.includes(k));
  return BURNOUT_REPLY[key || 'default'];
}

function getNormalReply(text) {
  let reply = null;
  for (const [k, v] of Object.entries(COACH_REPLIES)) {
    if (k.startsWith('keywords_') && Array.isArray(v)) {
      if (v.some(kw => text.includes(kw))) {
        const matchedKw = v.find(kw => text.includes(kw));
        if (matchedKw && COACH_REPLIES[matchedKw]) { reply = COACH_REPLIES[matchedKw]; break; }
      }
    }
  }
  if (!reply) {
    const directKey = Object.keys(COACH_REPLIES).find(k => !k.startsWith('keywords_') && k !== 'default' && text.includes(k));
    reply = directKey ? COACH_REPLIES[directKey] : COACH_REPLIES['default'];
  }
  return reply;
}

  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(typing);

  const level = classifyInput(val);
  const delay = level === 'crisis' ? 400 : 800;

  setTimeout(() => {

    } else if (level === 'burnout') {
      typeReply(msgs, getBurnoutReply(val));
    } else {
      typeReply(msgs, getNormalReply(val));
    }
  }, delay);
}

/* ========== シェア ========== */
function shareResult(norm, dominant) {
  const labels = { stress:'仕事ストレス', burnout:'燃え尽き傾向', environment:'職場環境', leaving:'転職意向' };
  const txt = `【仕事ストレスチェック結果】\n仕事ストレス：${norm.stress} / 燃え尽き傾向：${norm.burnout} / 職場環境：${norm.environment} / 転職意向：${norm.leaving}\n\n主な傾向：${labels[dominant]}\n今週の改善アクションに取り組みます。\n\n#仕事ストレスチェック #仕事で壊れる前に`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.querySelector('.btn-outline');
      const orig = btn.textContent;
      btn.textContent = 'コピーしました';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }
}

/* ========== リセット ========== */
function resetApp() {
  cur = 0;
  answers = new Array(QUESTIONS.length).fill(-1);
  rawScores = { stress:0, burnout:0, environment:0, leaving:0, engagement:0 };
  prevRaw   = { stress:0, burnout:0, environment:0, leaving:0, engagement:0 };
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderQuestion();
  updatePreview('');
  window.scrollTo(0, 0);
}

/* ========== 初期化 ========== */
renderQuestion();

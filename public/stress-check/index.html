<style>
  :root {
    --accent: #2563EB;
    --accent-soft: #EFF6FF;
    --accent-dark: #1D4ED8;
    --text: #0F172A;
    --muted: #64748B;
    --line: #E2E8F0;
    --panel: #FFFFFF;
    --page: #F8FAFC;
    --sand-1: #EFF6FF;
    --sand-2: #DBEAFE;
    --sand-3: #BFDBFE;
    --sand-dark: #1E3A5F;
    --warning: #D97706;
    --danger: #DC2626;
    --col-stress: #DC2626;
    --col-burnout: #D97706;
    --col-environment: #2563EB;
    --col-leaving: #7C3AED;
    --radius: 12px;
    --shadow: 0 14px 38px rgba(15,23,42,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--page);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    line-height: 1.6;
  }
  button, input { font: inherit; }
  .hidden { display: none !important; }

  /* HEADER */
  .site-header {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.04em; text-decoration: none; }
  .site-logo em { color: var(--accent); font-style: normal; }
  .site-tagline { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .logo-read { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-nav-link { font-size: 13px; color: var(--muted); text-decoration: none; font-weight: 600; }
  .header-nav-link:hover { color: var(--accent); }
  .header-diag-btn { background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; padding: 9px 18px; border-radius: 6px; text-decoration: none; }
  .hamburger-btn { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; background: none; border: none; }
  .hamburger-btn span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
  .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger-btn.open span:nth-child(2) { opacity: 0; }
  .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-menu { display: none; position: absolute; top: 64px; left: 0; right: 0; background: var(--panel); border-bottom: 1px solid var(--line); padding: 16px 24px; z-index: 200; flex-direction: column; gap: 0; box-shadow: 0 8px 24px rgba(15,23,42,0.1); }
  .mobile-menu a { font-size: 15px; color: var(--text); text-decoration: none; font-weight: 600; padding: 12px 0; border-bottom: 1px solid var(--line); display: block; }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu.open { display: flex; }
  @media (max-width: 768px) {
    .header-right { display: none; }
    .hamburger-btn { display: flex; }
    .site-header { position: relative; }
  }

  /* APP LAYOUT */
  .app {
    width: min(1180px, calc(100% - 32px));
    margin: 12px auto;
    display: grid;
    grid-template-columns: minmax(0, 1.06fr) minmax(360px, 0.94fr);
    gap: 20px;
    align-items: stretch;
  }

  /* QUESTION AREA */
  .question-area {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    min-height: auto;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 0;
    justify-content: space-between;
  }

  /* INTRO BLOCK */
  .intro-block {
    background: var(--page);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 14px;
  }
  .intro-block h1 {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 3px;
    letter-spacing: -0.01em;
  }
  .intro-block p { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
  .intro-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .intro-chip { font-size: 11px; color: var(--accent); font-weight: 700; background: var(--accent-soft); padding: 3px 10px; border-radius: 999px; border: 1px solid var(--sand-3); }

  /* TOPLINE */
  .topline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .kicker { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: 0.03em; }
  .q-count { color: var(--muted); font-size: 14px; font-weight: 700; }

  /* PROGRESS */
  .progress {
    height: 7px;
    margin-bottom: 14px;
    overflow: hidden;
    border-radius: 999px;
    background: #EEF3F1;
  }
  .progress-fill {
    height: 100%;
    width: 10%;
    border-radius: inherit;
    background: var(--accent);
    transition: width 320ms ease;
  }

  /* TYPE BADGE */
  .q-type-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 10px;
    background: var(--sand-2);
    color: var(--accent);
    border: 1px solid var(--sand-3);
  }

  /* QUESTION TEXT */
  .q-text {
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 700;
    line-height: 1.38;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }

  /* OPTIONS */
  .options { display: grid; gap: 8px; margin-bottom: auto; }
  .option {
    position: relative;
    display: grid;
    grid-template-columns: 22px minmax(0,1fr);
    gap: 14px;
    min-height: 46px;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
  }
  .option:hover {
    border-color: rgba(29,158,117,0.48);
    transform: translateY(-1px);
    box-shadow: 0 9px 20px rgba(21,40,35,0.06);
  }
  .option input { position: absolute; opacity: 0; pointer-events: none; }
  .opt-radio {
    width: 22px; height: 22px; margin-top: 2px;
    border: 2px solid #CBD7D2; border-radius: 999px;
    background: #fff;
    box-shadow: inset 0 0 0 5px #fff;
    transition: border-color 180ms ease, background 180ms ease;
    flex-shrink: 0;
  }
  .opt-text { min-width: 0; }
  .opt-label { font-size: 15px; font-weight: 700; line-height: 1.45; }
  .opt-note { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 600; }
  .option.selected { border-color: var(--accent); background: var(--accent-soft); }
  .option.selected .opt-radio { border-color: var(--accent); background: var(--accent); }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 12px;
  }
  .btn {
    min-width: 116px; min-height: 46px; padding: 0 18px;
    border: 1px solid var(--line); border-radius: 10px;
    background: #fff; color: var(--text);
    font-weight: 800; cursor: pointer;
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); border-color: #BFD0CA; }
  .btn:disabled { color: #A7B1AD; cursor: not-allowed; }
  .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
  @media (max-width: 600px) {
    .btn { min-height: 52px; font-size: 15px; }
    .btn.primary { min-height: 52px; font-size: 15px; }
  }
  .btn.primary:hover:not(:disabled) { background: var(--accent-dark); border-color: var(--accent-dark); }

  /* PREVIEW PANEL */
  .preview-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .preview-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .live-label { color: var(--muted); font-size: 12px; font-weight: 900; }
  .live-dot {
    display: inline-flex; width: 10px; height: 10px; margin-right: 7px;
    border-radius: 999px; background: #E53E3E;
    box-shadow: 0 0 0 0 rgba(229,62,62,0.4);
    animation: livePulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 rgba(229,62,62,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(229,62,62,0); }
    100% { box-shadow: 0 0 0 0 rgba(229,62,62,0); }
  }
  .risk-pill {
    padding: 6px 10px; border-radius: 999px;
    background: var(--sand-2); color: var(--accent);
    font-size: 12px; font-weight: 900; border: 1px solid var(--sand-3);
  }

  /* TOTAL SCORE */
  .gauge-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 4px;
  }
  .gauge-svg { width: 130px; height: 78px; }
  .gauge-center {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .score-number {
    font-size: clamp(26px,3vw,36px);
    line-height: 1;
    font-weight: 900;
    letter-spacing: -0.02em;
    transition: color 400ms ease;
  }
  .score-number.bump { transform: scale(1.04); }
  .score-unit { color: var(--muted); font-size: 13px; font-weight: 800; }
  .floating-delta {
    font-size: 16px;
    font-weight: 900;
    opacity: 0;
    margin-top: 2px;
  }
  .floating-delta.show { animation: floatDelta 680ms ease both; }
  .floating-delta {
    justify-self: end;
    min-width: 54px; text-align: right;
    color: var(--accent); font-size: 24px; font-weight: 900;
    opacity: 0; transform: translateY(8px);
  }
  .floating-delta.show { animation: floatDelta 680ms ease both; }
  @keyframes floatDelta {
    0%   { opacity:0; transform:translateY(10px); }
    22%  { opacity:1; }
    100% { opacity:0; transform:translateY(-16px); }
  }

  /* AXES */
  .axes { display: grid; gap: 8px; }
  .axis-item { display: grid; gap: 7px; }
  .axis-top {
    display: grid;
    grid-template-columns: minmax(100px,1fr) auto auto;
    gap: 10px;
    align-items: baseline;
  }
  .axis-name { font-size: 13px; font-weight: 800; }
  .axis-val { min-width: 30px; text-align: right; font-size: 14px; font-weight: 900; }
  .axis-delta {
    min-width: 40px; text-align: right;
    color: var(--muted); font-size: 13px; font-weight: 900;
    opacity: 0.78;
    transition: color 160ms ease;
  }
  .axis-delta.delta-up { color: var(--danger); }
  .axis-delta.delta-down { color: var(--accent); }
  .axis-delta.delta-pop { animation: deltaPop 520ms ease; }
  @keyframes deltaPop {
    0%   { transform:scale(0.8); opacity:0; }
    45%  { transform:scale(1.18); opacity:1; }
    100% { transform:scale(1); opacity:0.78; }
  }
  .bar-track { height: 8px; overflow: hidden; border-radius: 999px; background: var(--line); }
  .bar-fill { height: 100%; width: 0; border-radius: inherit; transition: width 420ms ease; }
  .bar-stress      { background: #E24B4A; }
  .bar-burnout     { background: #D4860A; }
  .bar-environment { background: #2E86C1; }
  .bar-leaving     { background: #7D5BC6; }

  /* AI BOX */
  .ai-box {
    min-height: 80px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #FBFDFD;
  }
  .ai-title {
    display: flex; justify-content: space-between; gap: 10px;
    margin-bottom: 10px; color: var(--accent);
    font-size: 11px; font-weight: 900;
  }
  .answered { color: var(--muted); font-size: 11px; font-weight: 800; }
  .ai-comment { font-size: 13px; font-weight: 600; line-height: 1.6; min-height: 40px; }
  .cursor {
    display: inline-block; width: 8px; height: 1.05em; margin-left: 3px;
    background: var(--accent); vertical-align: -0.16em;
    animation: blink 780ms steps(2,start) infinite;
  }  @keyframes blink { 50% { opacity:0; } }

  /* ===== RESULT PAGE ===== */
  .result-page {
    width: min(1180px, calc(100% - 32px));
    margin: 12px auto;
    display: grid;
    gap: 20px;
  }
  .result-panel, .result-card, .chat-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .result-panel { padding: 20px 24px; }
  .result-header {
    display: grid;
    grid-template-columns: minmax(0,1fr) auto;
    gap: 18px; align-items: start;
  }
  .result-kicker { color: var(--navy); font-size: 12px; font-weight: 800; margin-bottom: 8px; }
  .result-title {
    font-size: clamp(20px,3vw,32px);
    line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 10px;
  }
  .result-lead { max-width: 720px; color: var(--muted); font-size: 15px; font-weight: 650; line-height: 1.8; }
  .result-total-box {
    min-width: 130px; padding: 16px; text-align: center;
    border: 1px solid var(--sand-3); border-radius: 12px; background: var(--sand-1);
  }
  .result-total-num { display: block; font-size: 46px; line-height: 1; color: var(--accent); font-weight: 900; }
  .result-total-label { color: var(--muted); font-size: 11px; font-weight: 900; }

  .score-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 10px;
  }
  .result-card { padding: 12px 14px; }
  .card-label { color: var(--muted); font-size: 14px; font-weight: 900; margin-bottom: 10px; }
  .card-score { display: flex; align-items: baseline; gap: 5px; margin-bottom: 10px; }
  .card-score strong { font-size: 26px; line-height: 1; font-weight: 900; }
  .card-score span { color: var(--muted); font-weight: 800; }

  .section-title { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 14px; }
  .analysis-text { color: var(--muted); font-size: 15px; font-weight: 650; line-height: 1.85; white-space: pre-wrap; }
  .reassurance {
    margin-top: 14px; padding: 12px 14px;
    border-radius: 10px; background: var(--sand-2);
    color: var(--accent-dark); font-size: 13px; font-weight: 800;
    border: 1px solid var(--sand-3);
  }

  .task-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
  .task-card {
    display: grid; grid-template-columns: 26px minmax(0,1fr); gap: 12px;
    align-items: start; min-height: 110px; padding: 16px;
    border: 1px solid var(--line); border-radius: 12px;
    background: #fff; cursor: pointer;
    transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    text-align: left;
  }
  .task-card:hover { border-color: rgba(29,158,117,0.5); transform: translateY(-1px); }
  .task-card.done { border-color: var(--accent); background: var(--accent-soft); }
  .task-check {
    display: grid; place-items: center;
    width: 26px; height: 26px;
    border: 2px solid #CBD7D2; border-radius: 8px;
    color: #fff; font-size: 16px; font-weight: 900;
    transition: border-color 180ms, background 180ms;
  }
  .task-card.done .task-check { border-color: var(--accent); background: var(--accent); }
  .task-title { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 5px; }
  .task-desc { color: var(--muted); font-size: 13px; font-weight: 400; line-height: 1.7; }

  /* SIM */
  .sim-note { color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 16px; }
  .sim-list { display: grid; gap: 16px; }
  .sim-row { display: grid; grid-template-columns: 120px minmax(0,1fr); gap: 12px; align-items: center; }
  .sim-name { font-size: 12px; font-weight: 900; }
  .sim-bars { display: grid; gap: 7px; }
  .sim-line {
    display: grid; grid-template-columns: 48px minmax(0,1fr) 36px;
    gap: 8px; align-items: center;
    color: var(--muted); font-size: 11px; font-weight: 800;
  }
  .sim-track { height: 10px; overflow: hidden; border-radius: 999px; background: #EEF3F1; }
  .sim-fill { height: 100%; width: 0; border-radius: inherit; background: #AAB8B3; transition: width 480ms ease; }
  .sim-fill.improved { background: var(--accent); }

  /* CTA */
  .cta-card {
    background: var(--sand-2);
    border: 1px solid var(--sand-3);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 30px;
    text-align: center;
  }
  .cta-title { font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
  .cta-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }

  .result-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .rec-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
  .rec-card { display: flex; flex-direction: column; background: var(--page); border: 1px solid var(--line); border-radius: 10px; padding: 16px; text-decoration: none; color: var(--text); transition: border-color 180ms, transform 180ms; }
  .rec-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .rec-cat { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 6px; }
  .rec-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.55; margin-bottom: 8px; flex: 1; }
  .rec-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
  .rec-link { font-size: 12px; font-weight: 700; color: var(--accent); }
  @media(max-width:600px){ .rec-grid { grid-template-columns: 1fr; } }
  .wide-btn { min-width: 200px; }

  /* CHAT */
  .chat-panel {
    display: grid;
    grid-template-rows: auto minmax(180px,auto) auto;
    min-height: 380px;
    padding: 22px;
  }
  .chat-head {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 0;
  }
  .chat-context { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 4px; }
  .chat-log { display: grid; align-content: start; gap: 10px; padding: 16px 0; }
  .bubble {
    max-width: 84%; padding: 11px 14px; border-radius: 12px;

  const sorted = Object.entries(norm)
    .filter(([k]) => ['stress','burnout','environment','leaving'].includes(k))
    .sort((a, b) => b[1] - a[1]);

  const selected = [];
  const usedSlugs = new Set();

  // 上位軸から順に1記事ずつ選ぶ
  for (const [axis] of sorted) {
    if (selected.length >= count) break;
    const cats = AXIS_CATEGORY_MAP[axis] || [];
    for (const cat of cats) {
      const candidates = ARTICLE_DB
        .filter(a => a.category === cat && !usedSlugs.has(a.slug))
        .sort((a, b) => a.priority - b.priority);
      if (candidates.length > 0) {
        selected.push(candidates[0]);
        usedSlugs.add(candidates[0].slug);
        break;
      }
    }
  }

  // 足りない場合は残りから補完
  if (selected.length < count) {
    const remaining = ARTICLE_DB.filter(a => !usedSlugs.has(a.slug));
    for (const art of remaining) {
      if (selected.length >= count) break;
      selected.push(art);
    }
  }

  return selected;
}
</script>

/* ===== ユーティリティ ===== */
function clamp(v) { return Math.min(100, Math.max(0, Math.round(v))); }
function rawToNorm(raw) {
  return {
    stress:      clamp(raw.stress      / MAX_RAW.stress      * 100),
    burnout:     clamp(raw.burnout     / MAX_RAW.burnout     * 100),
    environment: clamp(raw.environment / MAX_RAW.environment * 100),
    leaving:     clamp(raw.leaving     / MAX_RAW.leaving     * 100),
    engagement:  clamp(raw.engagement  / MAX_RAW.engagement  * 100)
  };
}
function getLevel(v) { if(v<25)return'low'; if(v<50)return'moderate'; if(v<75)return'high'; return'very_high'; }
function calcTotal(norm) { return clamp(norm.stress*0.32+norm.burnout*0.28+norm.environment*0.23+norm.leaving*0.17); }
function getDominant(norm) { return ['stress','burnout','environment','leaving'].reduce((a,b)=>norm[a]>=norm[b]?a:b); }
function answerToPoints(idx) { return [0,2.5,5,7.5,10][idx]; }

function calcRaw() {
  const s = {stress:0,burnout:0,environment:0,leaving:0,engagement:0};
  answers.forEach((ai,qi) => {
    if(ai<0) return;
    const pts = answerToPoints(ai);
    Object.keys(QUESTIONS[qi].weights).forEach(k => { s[k] += pts * QUESTIONS[qi].weights[k]; });
  });
  return s;
}

/* ===== 描画：質問 ===== */
var _prevCur = 0;
function renderQuestion() {
  const q = QUESTIONS[cur];
  const goingForward = cur >= _prevCur;
  _prevCur = cur;
  document.getElementById('qNum').textContent = `Q${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('progFill').style.width = ((cur+1)/QUESTIONS.length*100) + '%';
  const qTextEl = document.getElementById('qText');
  qTextEl.textContent = q.text;
  qTextEl.classList.remove('question-slide-in','question-slide-back');
  void qTextEl.offsetWidth;
  qTextEl.classList.add(goingForward ? 'question-slide-in' : 'question-slide-back');
  document.getElementById('btnBack').disabled = cur===0;
  const nb = document.getElementById('btnNext');
  nb.textContent = cur===QUESTIONS.length-1 ? '完了' : '次へ';
  nb.disabled = answers[cur]<0;

  const ol = document.getElementById('optList');
  ol.innerHTML = '';
  ol.classList.remove('question-slide-in','question-slide-back');
  void ol.offsetWidth;
  ol.classList.add(goingForward ? 'question-slide-in' : 'question-slide-back');
  q.opts.forEach((o,i) => {
    const lbl = document.createElement('label');
    lbl.className = 'option' + (answers[cur]===i?' selected':'');
    lbl.innerHTML = `<input type="radio" name="q${cur}" value="${i}" ${answers[cur]===i?'checked':''}><span class="opt-radio" aria-hidden="true"></span><span class="opt-text"><span class="opt-label">${o.label}</span><span class="opt-note">${o.note}</span></span>`;
    lbl.addEventListener('click', () => selectAnswer(i));
    ol.appendChild(lbl);
  });
}

function selectAnswer(idx) {
  if(answers[cur]===idx) return;
  prevRaw = {...rawScores};
  answers[cur] = idx;
  rawScores = calcRaw();
  renderQuestion();
  updatePreview(QUESTIONS[cur].comments[idx]);
}

/* ===== プレビュー更新 ===== */
function updatePreview(comment) {
  const answered = answers.filter(a=>a>=0).length;
  document.getElementById('answeredCount').textContent = `回答済み ${answered}/${QUESTIONS.length}`;

  if(answered===0) {
    document.getElementById('totalNum').textContent = '0';
    document.getElementById('totalDelta').textContent = '';
    document.getElementById('totalDelta').classList.remove('show');
    AXES.forEach(a => {
      document.getElementById('val-'+a.key).textContent = '0';
      document.getElementById('bar-'+a.key).style.width = '0%';
      document.getElementById('delta-'+a.key).textContent = '±0';
      document.getElementById('delta-'+a.key).className = 'axis-delta';
    });
    return;
  }

  const norm = rawToNorm(rawScores);
  const prevNorm = rawToNorm(prevRaw);
  const total = calcTotal(norm);
  const prevTotal = calcTotal(prevNorm);
  const totalDiff = total - prevTotal;

  const numEl = document.getElementById('totalNum');
  numEl.textContent = total;
  numEl.classList.remove('bump');
  requestAnimationFrame(() => numEl.classList.add('bump'));
  setTimeout(() => numEl.classList.remove('bump'), 260);

  // ゲージ更新（青→黄→赤のグラデーション）
  const gaugeFill = document.getElementById('gaugeFill');
  if (gaugeFill) {
    const arcLen = 172.79;
    const offset = arcLen - (arcLen * total / 100);
    gaugeFill.style.strokeDashoffset = offset;
    // 色：0-30青 / 31-60黄 / 61-80オレンジ / 81-100赤
    let gaugeColor = '#2563EB';
    if (total > 80) gaugeColor = '#DC2626';
    else if (total > 60) gaugeColor = '#EA580C';
    else if (total > 30) gaugeColor = '#D97706';
    gaugeFill.style.stroke = gaugeColor;
    numEl.style.color = gaugeColor;
  }

  const deltaEl = document.getElementById('totalDelta');
  deltaEl.textContent = totalDiff===0 ? '±0' : (totalDiff>0?'↑':'↓')+Math.abs(totalDiff);
  deltaEl.style.color = totalDiff>0 ? 'var(--danger)' : totalDiff<0 ? 'var(--accent)' : 'var(--muted)';
  deltaEl.classList.remove('show');
  requestAnimationFrame(() => deltaEl.classList.add('show'));

  AXES.forEach(a => {
    const v = norm[a.key], pv = prevNorm[a.key];
    const diff = v - pv;
    document.getElementById('val-'+a.key).textContent = v;
    document.getElementById('bar-'+a.key).style.width = v+'%';
    const d = document.getElementById('delta-'+a.key);
    d.textContent = diff===0 ? '±0' : (diff>0?'↑':'↓')+Math.abs(diff);
    d.className = 'axis-delta' + (diff>0?' delta-up':diff<0?' delta-down':'');
    d.classList.remove('delta-pop');
    requestAnimationFrame(() => d.classList.add('delta-pop'));
  });

  if(comment) typeComment(comment);
}

function typeComment(text) {
  if(typeTimer) clearInterval(typeTimer);
  const el = document.getElementById('aiComment');
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    if(i<text.length) { el.textContent += text[i++]; }
    else clearInterval(typeTimer);
  }, 22);
}

function goNext() {
  if(answers[cur]<0) return;
  if(cur<QUESTIONS.length-1) { cur++; renderQuestion(); }
  else renderResultPage();
}
function goBack() { if(cur>0) { cur--; renderQuestion(); } }

  }
  if((s.leaving.level==='high'||s.leaving.level==='very_high')&&(s.stress.level==='low'||s.stress.level==='moderate')) lines.push('身体的な疲弊よりも、キャリアへの迷いが転職意向を高めているようです。');
  if((s.environment.level==='high'||s.environment.level==='very_high')&&s.engagement.value>=50) lines.push('仕事内容よりも組織や人間関係が主な負担になっています。仕事への意欲は残っているので、環境が変われば改善しやすい状態です。');
  if(lines.length===0) lines.push('今の状態は複数の要因が絡み合っています。まずは一番気になる点から、小さく改善を試みてください。');
  return lines.join('\n\n');
}

/* ===== ② スコア連動のdefaultレスポンス ===== */
let chatContext = { dominant:'stress', norm:{stress:0,burnout:0,environment:0,leaving:0}, total:0 };

function setChatContext(dominant, norm, total) {
  chatContext = { dominant, norm, total };
}

function getContextualDefault() {
  const { dominant, norm, total } = chatContext;

  // 上位2軸を取得
  const sorted = ['stress','burnout','environment','leaving']
    .map(k => ({ key: k, val: norm[k] || 0 }))
    .sort((a, b) => b.val - a.val);
  const top1 = sorted[0].key;
  const top2 = sorted[1].key;
  const top1val = sorted[0].val;
  const top2val = sorted[1].val;

  const axisLabel = { stress:'仕事ストレス', burnout:'燃え尽き傾向', environment:'職場環境', leaving:'転職意向' };

  // 低ストレス
  if(total < 30) {
    return '今の状態は比較的安定しているようです。\n\nこのコンディションを維持するために、休息のリズムと相談できる環境を崩さないことが大切です。\n\n気になっていることがあれば、もう少し具体的に教えてもらえますか？';
  }

  // 上位2軸の組み合わせで個別化
  if(top1 === 'stress' && top2 === 'burnout' && top2val > 40) {
    return `仕事への消耗と、やりがいの低下が同時に出ています（仕事ストレス${top1val}・燃え尽き${top2val}）。\n\n疲れているだけでなく、「頑張る意味が見えにくくなっている」状態のことがあります。\n\n今一番つらいのは、量の問題ですか？それとも意味や手応えの問題ですか？`;
  }
  if(top1 === 'stress' && top2 === 'leaving' && top2val > 40) {
    return `仕事のストレスと転職への気持ちが同時に強く出ています（仕事ストレス${top1val}・転職意向${top2val}）。\n\nストレスだけでなく、今の職場とのミスマッチも影響している可能性があります。\n\n「辞めたい」という気持ちは、今の状況への反応として自然なことです。変えたいのは何ですか？`;
  }
  if(top1 === 'burnout' && top2 === 'leaving' && top2val > 40) {
    return `燃え尽きと転職意向が同時に高く出ています（燃え尽き${top1val}・転職意向${top2val}）。\n\n「もう頑張れない」という疲労感と、「ここにはいられない」という気持ちが重なっている状態のことがあります。\n\n今すぐ転職を決める必要はありません。まず何が一番消耗していますか？`;
  }
  if(top1 === 'environment' && top2 === 'leaving' && top2val > 40) {
    return `職場環境への負担と転職意向が両方高く出ています（職場環境${top1val}・転職意向${top2val}）。\n\n仕事内容よりも、職場の人間関係や評価・制度への不満が転職を考えさせているケースが多いです。\n\n環境が変われば改善しますか？それとも仕事そのものへの問題もありますか？`;
  }
  if(top1 === 'burnout' && top2 === 'stress' && top2val > 40) {
    return `燃え尽き傾向と仕事のストレスが同時に出ています（燃え尽き${top1val}・仕事ストレス${top2val}）。\n\n疲れているのに休めない、頑張っても報われないという感覚が続いていませんか？\n\n今一番きついことを教えてもらえますか？`;
  }

  // dominant1軸のみ
  if(top1 === 'burnout') {
    return `診断では${axisLabel[top1]}が${top1val}と高めに出ています。\n\n「頑張り続けること」より「回復すること」を今は優先してください。\n\n具体的にどんなことが一番消耗していますか？`;
  }
  if(top1 === 'leaving') {
    return `診断では${axisLabel[top1]}が${top1val}と高めに出ています。\n\n急いで結論を出す必要はありませんが、今の状況を整理しておくことは大事です。\n\n変えたいのは何ですか？仕事内容・職場環境・人間関係・給料のどれに近いですか？`;
  }
  if(top1 === 'environment') {
    return `診断では${axisLabel[top1]}が${top1val}と高めに出ています。\n\n人間関係・評価・業務量のうち、どれが一番消耗していますか？`;
  }

  return `診断では${axisLabel[top1]}が${top1val}と高めに出ています。\n\nもう少し具体的に教えてもらえますか？「残業が多い」「上司と合わない」「やる気が出ない」など、一番気になっていることを入れてもらうと、より具体的にお伝えできます。`;
}

function classifyInput(text) {
  if(CRISIS_WORDS.some(w=>text.includes(w))) return 'crisis';
  if(BURNOUT_WORDS.some(w=>text.includes(w))) return 'burnout';
  return 'normal';
}

function getBurnoutReply(text) {
  const map = {
    '限界':'限界を感じているときは「もっと頑張ろう」ではなく、まず「止まること」が最優先です。\n\n今週の3つ：\n① 有給または半休を1日取る計画を立てる\n② 信頼できる人に今の状態を話す\n③ 気になる症状があれば、かかりつけ医か内科を受診する',
    '眠れない':'眠れない状態が続くと、判断力・感情・体力すべてが低下します。\n\n今週の3つ：\n① 就寝1時間前にスマホ・PCを閉じる\n② 仕事のことを考えそうになったらメモに書き出す\n③ 2週間改善しなければ、内科またはメンタルクリニックへの相談を検討する',
    '涙が出':'涙が出るのは、心が「もう十分すぎるほど頑張った」と言っているサインです。\n\n弱いのではありません。限界まで頑張ってきた証拠です。\n\n① 今日だけは「仕事のことを考えない時間」を30分作る\n② 信頼できる人に「最近しんどい」と一言だけ話してみる',
    '動悸':'動悸・吐き気・胃の痛みなど身体症状が出ているなら、それは精神的負荷が身体限界に達しているサインです。\n\n① まず内科を受診して身体的な問題がないか確認する\n② 可能であれば1〜2日休む\n③ 職場の産業医または上司に「体調不良」として相談する',
    'default':'心身に強い負荷がかかっている状態です。今は「解決」より「回復」を優先してください。\n\n産業医・メンタルクリニック・よりそいホットライン（0120-279-338）も活用できます。'
  };
  for(const [k,v] of Object.entries(map)) { if(k!=='default'&&text.includes(k)) return v; }
  return map.default;
}

function getNormalReply(text) {
  for(const entry of KEYWORD_MAP) {
    if(entry.keys.some(k=>text.includes(k))) return entry.reply;
  }
  return getContextualDefault();
}

/* ===== 相談タイプ選択 ===== */

/* ===== AI分析カードを生成 ===== */
function buildAnalysisCard(text) {
  // 感情推定
  const emotionMap = [
    { words:['限界','消耗','ボロボロ','もう無理','辛すぎ','しんどすぎ'], label:'消耗・限界', pct:90 },
    { words:['不安','怖い','心配','どうしよう','迷って','わからない'], label:'不安・迷い', pct:72 },
    { words:['怒り','理不尽','おかしい','腹立','ムカ','納得いか'], label:'怒り・不満', pct:78 },
    { words:['悲しい','涙','泣け','落ち込','辛い','悔し'], label:'悲しみ・落胆', pct:68 },
    { words:['疲れ','疲労','ぐったり','眠れ','休めない'], label:'疲労・消耗', pct:65 },
    { words:['辞めたい','転職','逃げ','もう嫌','辞める'], label:'離脱・葛藤', pct:74 },
  ];
  let detectedEmotion = { label:'ストレス', pct: 55 };
  for (const e of emotionMap) {
    if (e.words.some(w => text.includes(w))) { detectedEmotion = e; break; }
  }

  // テーマ推定
  const themeMap = [
    { words:['上司','パワハラ','怒鳴','暴言','ハラスメント','セクハラ'], label:'ハラスメント' },
    { words:['残業','残業代','サービス残業','労基','違法','働きすぎ'], label:'労働条件' },
    { words:['辞めたい','転職','退職','辞める','辞め'], label:'転職・退職' },
    { words:['眠れ','動悸','吐き気','涙','頭痛','体'], label:'身体症状' },
    { words:['やる気','モチベーション','燃え尽き','意欲','気力'], label:'バーンアウト' },
    { words:['人間関係','同僚','チーム','孤立','無視','派閥'], label:'人間関係' },
    { words:['評価','給料','昇進','報われない','認めてもらえ'], label:'評価・待遇' },
  ];
  let detectedTheme = '仕事ストレス';
  if (selectedTopic && selectedTopic !== 'その他') detectedTheme = selectedTopic;
  else {
    for (const t of themeMap) {
      if (t.words.some(w => text.includes(w))) { detectedTheme = t.label; break; }
    }
  }

  // アドバイス優先度
  const { dominant, norm, total } = chatContext;
  let priority = '状況の整理';
  if (total >= 70) priority = '休息・相談窓口';
  else if (detectedTheme === 'ハラスメント') priority = '記録・相談窓口';
  else if (detectedTheme === '転職・退職') priority = '選択肢を整理';
  else if (detectedTheme === '身体症状') priority = '医療機関への相談';
  else if (norm[dominant] >= 70) priority = '負荷の軽減';

  const card = document.createElement('div');
  card.className = 'ai-analysis-card';
  card.innerHTML = `
    <div class="ai-analysis-header">
      <div class="ai-analysis-spinner"></div>
      AI分析中...
    </div>
    <div class="ai-analysis-body">
      <div class="ai-analysis-item">
        <div class="ai-analysis-key">感情</div>
        <div class="ai-analysis-val"><span class="pct">${detectedEmotion.pct}%</span> ${detectedEmotion.label}</div>
      </div>
      <div class="ai-analysis-item">
        <div class="ai-analysis-key">相談テーマ</div>
        <div class="ai-analysis-val">${detectedTheme}</div>
      </div>
      <div class="ai-analysis-item">
        <div class="ai-analysis-key">優先アドバイス</div>
        <div class="ai-analysis-val">${priority}</div>
      </div>
    </div>
  `;
  return card;
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const val = inp.value.trim();
  if(!val) return;
  const msgs = document.getElementById('chatMsgs');

  const ub = document.createElement('div');
  ub.className = 'bubble user';
  ub.textContent = val;
  msgs.appendChild(ub);
  inp.value = '';

  // AI分析カードを先に表示
  const card = buildAnalysisCard(val);
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;

  const typing = document.createElement('div');
  typing.className = 'typing-dots';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  const level = classifyInput(val);
  const delay = level==='crisis' ? 600 : 1400;

  setTimeout(()=>{
    // カードのスピナーをチェックマークに変える
    const header = card.querySelector('.ai-analysis-header');
    if (header) {
      header.innerHTML = '<span style="color:var(--accent);font-size:13px;">✓</span> 分析完了';
    }

    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    setTimeout(()=>{
      typing.remove();
      if (level === 'crisis') {
        const rb = document.createElement('div');
        rb.className = 'bubble crisis';
        rb.textContent = CRISIS_REPLY;
        msgs.appendChild(rb);
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'ai-bubble-wrap';
        const icon = document.createElement('img');
        icon.src = '/images/ai-coach.png';
        icon.className = 'ai-bubble-icon';
        icon.alt = 'AIコーチ';
        const bub = document.createElement('div');
        bub.className = 'bubble ai';
        const replyText = level==='burnout' ? getBurnoutReply(val) : getNormalReply(val);
        bub.textContent = replyText;
        wrap.appendChild(icon);
        wrap.appendChild(bub);
        msgs.appendChild(wrap);

        // 関連記事を提示（5回に1回 or キーワードに記事が直結する場合）
        maybeShowArticleSuggestion(val, msgs);
      }
      msgs.scrollTop = msgs.scrollHeight;
    }, 700);
  }, delay);
}

    { words:['30代','キャリア','転職 30'], slug:'30dai-shigoto-yametai' },
    { words:['ブラック企業','ブラック 診断'], slug:'black-kigyo-shindan' },
    { words:['やばい会社','この会社おかしい'], slug:'kaisha-yabai' },
    { words:['退職代行','モームリ'], slug:'taisyoku-daikou-moumuri' },
    { words:['評価されない','認めてもらえ'], slug:'hyouka-sarenai' },
    { words:['行きたくない','朝 憂鬱','会社 行きたくない'], slug:'asa-shigoto-ikitakunai' },
    { words:['仕事できない','自信がない','ミスばかり'], slug:'shigoto-dekinai-tsurai' },
    { words:['人間関係','職場 疲れた','同僚'], slug:'ningen-kankei-tsukareta' },
    { words:['やる気','モチベーション','やる気が出ない'], slug:'shigoto-yaruki-denai' },
    { words:['限界','もう無理','限界サイン'], slug:'shigoto-genkai-sign' },
    { words:['ミス','ミスして落ち込む','ミス 怒られた'], slug:'shigoto-miss-ochikomi' },
    { words:['うつ','うつ病','適応障害'], slug:'shigoto-utsu' },

    { words:['HSP','繊細','敏感'], slug:'hsp-shigoto-muiteru' },

  let matchedSlug = null;

  // 直結キーワードがある or 3ターンおき
  if (!matchedSlug && chatTurnCount % 3 !== 0) return;

  const art = matchedSlug
